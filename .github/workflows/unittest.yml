#everything is in key-value format. The key is the name of the step and the value is the action to be performed in that step.
name: Python CI #name of the workflow

#Trigger the workflow on push or pull request events to the main branch
on:
    #Event types can be push, pull_request, merge, delete, etc. Based on these events, workflow will be triggered
    push: #event type
        branches: #specifies the branch on which the event should occur to trigger the workflow
            - main
    pull_request:
        branches: #event type
            - main
# The jobs section defines a collection of jobs that will be run as part of the workflow. Each job runs in a fresh instance of the virtual environment and can have its own set of steps.
jobs:
    test: #the name of the job(can be any name)
        runs-on: ubuntu-latest #container or virtual environment in which the job will run. This is specified using the runs-on key. The value can be a specific operating system, such as ubuntu-latest, windows-latest, or macos-latest, depending on the requirements of your workflow.

        steps: #defines workflow steps that will be executed as part of the job. Each step can run a command, execute a script, or use an action from the GitHub Actions marketplace. Steps are executed sequentially, and you can have multiple steps in a job to perform different tasks.
            #checkout code from the repository
            - name: Checkout code
              uses: actions/checkout@v2 #uses keyword is used to specify an action from the GitHub Actions marketplace. In this case, it is using the checkout action to check out the code from the repository so that it can be used in subsequent steps of the workflow.

            #set up python environment
            - name: Set up Python
              uses: actions/setup-python@v2
              with:
                python-version: '3.8' #specifies the version of Python to be set up in the environment. In this case, it is setting up Python version 3.8.
            
            #install dependencies
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip #upgrades pip to the latest version
                pip install -r requirements.txt #installs the dependencies specified in the requirements.txt file  
            
            #run tests
            - name: Run tests 
              run: pytest #runs the tests using pytest

